<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Toolify Hub – Smart Tools for Everyone</title>

  <!-- SEO -->
  <meta name="description" content="Toolify Hub provides free smart tools including currency converter, unit converter, age calculator, password generator, QR code generator, and image resizer. Fast, simple, accurate, and free.">

  <link rel="canonical" href="https://www.easytoolilfy.com/">

  <!-- AdSense (only once in header) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6408441237069178"
    crossorigin="anonymous"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <div class="brand">
    <h1>🌀 Toolify Hub</h1>
    <p>Smart Tools for Everyone</p>
  </div>
</header>

<main>

  <!-- HOME PAGE BANNER AD -->
  <div class="ad-block">
    <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-6408441237069178"
        data-ad-slot="5142973431"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <input id="tool-search" class="search-input" placeholder="Search tools…">

  <section class="tools">
    <div class="tool-card" onclick="showTool('currency')">💱<p>Currency</p></div>
    <div class="tool-card" onclick="showTool('unit')">📏<p>Unit</p></div>
    <div class="tool-card" onclick="showTool('password')">🔐<p>Password</p></div>
    <div class="tool-card" onclick="showTool('qr')">🔳<p>QR Code</p></div>
    <div class="tool-card" onclick="showTool('age')">🎂<p>Age</p></div>
    <div class="tool-card" onclick="showTool('image')">🖼<p>Image</p></div>
  </section>

  <!-- PANELS START -->
  <!-- CURRENCY TOOL -->
  <section id="currency" class="tool-panel">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Currency Converter</h2>

    <div class="ad-block">
      <ins class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-6408441237069178"
          data-ad-slot="8828612160"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <input type="number" id="amount" placeholder="Enter amount">

    <div class="currency-select-row">
      <select id="fromCurrency"></select>
      <button id="favFromBtn" class="fav-btn">⭐</button>
    </div>

    <div class="currency-select-row">
      <select id="toCurrency"></select>
      <button id="favToBtn" class="fav-btn">⭐</button>
    </div>

    <button id="convertBtn">Convert</button>
    <p id="currencyResult" class="result-text"></p>

    <h3 class="rate-table-title">Money Changer Rates vs MYR 🇲🇾</h3>
    <div class="rates-table-wrap">
      <table class="rates-table">
        <thead><tr><th>Currency</th><th>Rate (1 MYR = ?)</th></tr></thead>
        <tbody id="ratesBody"><tr><td colspan="2">Loading…</td></tr></tbody>
      </table>
    </div>
  </section>

  <!-- OTHER TOOLS (unit, password, qr, age, image) — unchanged -->
  <!-- Your full content kept same as above -->

</main>

<footer class="footer">
  <p>© 2025 easytoolilfy — Smart Tools for Everyone</p>
  <p>
    <a href="privacy.html">Privacy Policy</a> •

  </p>
</footer>

<script src="script.js"></script>
</body>
</html>
